# SD Card Image Layout for RK3399Pro Edge AI Camera
image sdcard.img {
    hdimage {
        gpt = "true"
    }

    # Partition 1: Boot (FAT32, kernel + dtb + u-boot)
    partition boot {
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        offset = 16K
        size = 128M
        image = "boot.vfat"
    }

    # Partition 2: Rootfs (ext4)
    partition rootfs {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        offset = 128M
        size = 512M
        image = "rootfs.ext4"
    }

    # Partition 3: Data (ext4, 剩余空间)
    partition data {
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
        size = 100%
        image = "data.ext4"
    }
}